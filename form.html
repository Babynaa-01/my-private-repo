<!DOCTYPE html>
<html>
    <head>
        <title> Form </title>
        <link rel="stylesheet" href="form.css">
    </head>
    <body>
        <h1 class="head"> Form </h1>
       <form class="forms">
        <label class="form-label" for="name"> Name: </label>
        <input class="form-input" type="text" id="name" name="name" required placeholder="Name"><br><br>
        <label class="form-label" for="email"> Email: </label>
        <input class="form-input" type="email" id="email" name="email" required placeholder="Email"><br><br>
        <label class="form-label" for="phone">Phone:</label>
        <input class="form-input" type="tel" id="phone" name="phone" required placeholder="012345678"><br><br>
        <input class="btn-primary" type="submit" value="Submit">
       </form>
        
</html>
