<!DOCTYPE html>
<html lang="en">
<head>
  <title>Grid Practice</title>
  </head>
  <body style="padding-bottom: 1000px;">
<div style=" 
  display: grid;
  grid-template-columns: 100px 100px;
  ">
  <div style=" background-color: lightblue;">div 1</div>
  <div style=" background-color: lightpink;">div 2 <p>buntui</p></div>
</div>
<div style=" 
  display: grid;
  grid-template-columns: 100px 100px 200px ;
  margin-top: 30px;
  ">
  <div style=" background-color: lightblue;">div 1</div>
  <div style=" background-color: lightpink;">div 2 <p>buntui</p></div>
  <div style=" background-color: lightgreen;">div 3</div>
  <div style=" background-color: lightpink;">div 2 <p>buntui</p></div>
</div>
<div style=" 
  display: grid;
  grid-template-columns: 100px 1fr ;
  margin-top: 30px;
  ">
  <div style=" background-color: lightblue;">div 1</div>
  <div style=" background-color: lightpink;">div 2 </div>
</div>
<div style=" 
  display: grid;
  grid-template-columns: 1fr 1fr 1fr ;
  margin-top: 30px;
  ">
  <div style=" background-color: lightblue;">div 1</div>
  <div style=" background-color: lightpink;">div 2 </div>
  <div style=" background-color: lightgreen;">div 3 </div>
</div>
<div style=" 
  display: grid;
  grid-template-columns: 1fr 1fr 1fr ;
  margin-top: 30px;
  height: 200px;
  column-gap: 20px;
  row-gap: 40px;
  ">
  <div style=" background-color: lightblue;">div 1</div>
  <div style=" background-color: lightpink;">div 2 </div>
  <div style=" background-color: lightgreen;">div 3 </div>
</div>
<div style=" 
  display: grid;
  grid-template-columns: 1fr 1fr 1fr ;
  margin-top: 30px;
  height: 200px;
  column-gap: 20px;
  row-gap: 40px;
  ">
  <div style=" background-color: lightpink;">div 1</div>
  <div style=" background-color: lightgreen;">div 2 </div>
  <div style=" background-color: lightblue;">div 3 </div>
</div>
  </body>
  </html>
